services:
  lxfetch:
    image: "${LXFETCH_IMAGE:-ghcr.io/yzfh-ty/lxfetch:latest}"
    container_name: lxfetch
    init: true
    ports:
      - "${LXFETCH_PORT:-9528}:${LXFETCH_PORT:-9528}"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      LXFETCH_HOST: "${LXFETCH_HOST:-0.0.0.0}"
      LXFETCH_PORT: "${LXFETCH_PORT:-9528}"
      LXFETCH_ADMIN_PASSWORD: "${LXFETCH_ADMIN_PASSWORD:-}"
      LXFETCH_ALLOW_UNSAFE_VM: "${LXFETCH_ALLOW_UNSAFE_VM:-}"
      NETEASE_COOKIE: "${NETEASE_COOKIE:-}"
      NETEASE_COOKIES: "${NETEASE_COOKIES:-}"
      WY_COOKIE: "${WY_COOKIE:-}"
      NETEASE_COOKIE_FILE: "${NETEASE_COOKIE_FILE:-}"
      WY_COOKIE_FILE: "${WY_COOKIE_FILE:-}"
      LXFETCH_DOWNLOAD_DIR: "${LXFETCH_DOWNLOAD_DIR:-}"
      LXFETCH_MAX_CONCURRENT: "${LXFETCH_MAX_CONCURRENT:-}"
      LXFETCH_THROTTLE_BYTES_PER_SECOND: "${LXFETCH_THROTTLE_BYTES_PER_SECOND:-}"
      LXFETCH_MAX_RETRIES: "${LXFETCH_MAX_RETRIES:-}"
      LXFETCH_RETRY_DELAY_MS: "${LXFETCH_RETRY_DELAY_MS:-}"
      LXFETCH_FILENAME_PATTERN: "${LXFETCH_FILENAME_PATTERN:-}"
      LXFETCH_EMBED_COVER: "${LXFETCH_EMBED_COVER:-}"
      LXFETCH_EMBED_LYRIC: "${LXFETCH_EMBED_LYRIC:-}"
      LXFETCH_WRITE_TAGS: "${LXFETCH_WRITE_TAGS:-}"
      LXFETCH_VERIFY_METADATA: "${LXFETCH_VERIFY_METADATA:-}"
      LXFETCH_CACHE_METADATA: "${LXFETCH_CACHE_METADATA:-}"
      LXFETCH_METADATA_CACHE_MAX_AGE_DAYS: "${LXFETCH_METADATA_CACHE_MAX_AGE_DAYS:-}"
      LXFETCH_METADATA_CACHE_MAX_BYTES: "${LXFETCH_METADATA_CACHE_MAX_BYTES:-}"
      LXFETCH_SKIP_EXISTING: "${LXFETCH_SKIP_EXISTING:-}"
      LXFETCH_UPGRADE_EXISTING: "${LXFETCH_UPGRADE_EXISTING:-}"
      LXFETCH_SUBSCRIPTION_MAX_TASKS_PER_RUN: "${LXFETCH_SUBSCRIPTION_MAX_TASKS_PER_RUN:-}"
      LXFETCH_SUBSCRIPTION_TASK_CREATE_DELAY_MS: "${LXFETCH_SUBSCRIPTION_TASK_CREATE_DELAY_MS:-}"
