<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LXFetch</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>LXFetch</h1>
      <span id="server-status">未连接</span>
    </div>
    <form id="admin-form" class="admin-form">
      <input id="admin-password" type="password" placeholder="管理员密码" autocomplete="current-password">
      <button type="submit">验证</button>
    </form>
  </header>

  <main class="app-shell">
    <aside class="panel sidebar">
      <nav class="menu" aria-label="主菜单">
        <button class="menu-item active" type="button" data-view="search">搜索下载</button>
        <button class="menu-item" type="button" data-view="songlist">歌单</button>
        <button class="menu-item" type="button" data-view="leaderboard">榜单</button>
        <button class="menu-item" type="button" data-view="subscriptions">订阅</button>
        <button class="menu-item" type="button" data-view="sources">音源</button>
        <button class="menu-item" type="button" data-view="tasks">任务</button>
        <button class="menu-item" type="button" data-view="files">文件</button>
        <button class="menu-item" type="button" data-view="config">配置</button>
      </nav>

    </aside>

    <section class="content">
      <section id="view-search" class="panel view-section active">
        <div class="panel-head">
          <h2>搜索下载</h2>
        </div>
        <form id="search-form" class="searchbar">
          <select id="search-source"></select>
          <input id="search-keyword" type="search" placeholder="歌曲 / 歌手">
          <button type="submit">搜索</button>
        </form>
        <div id="search-results" class="table-wrap"></div>
      </section>

      <section id="view-songlist" class="panel view-section">
        <div class="panel-head">
          <h2>歌单</h2>
        </div>
        <div class="stack">
          <form id="songlist-search-form" class="searchbar">
            <select id="songlist-source"></select>
            <input id="songlist-keyword" type="search" placeholder="歌单名称">
            <button type="submit">搜索歌单</button>
          </form>
          <div class="filterbar">
            <select id="songlist-sort"></select>
            <select id="songlist-tag"></select>
            <button id="songlist-load" type="button">加载歌单</button>
            <button id="songlist-tags-refresh" type="button">刷新标签</button>
          </div>
          <div class="filterbar userbar">
            <input id="songlist-uid" type="text" placeholder="用户 UID">
            <button id="songlist-user" type="button">用户歌单</button>
          </div>
        </div>
        <div class="browser-grid">
          <div>
            <div class="subhead">
              <h3>歌单</h3>
              <div class="row-actions">
                <button id="songlist-prev" type="button">上一页</button>
                <button id="songlist-next" type="button">下一页</button>
              </div>
            </div>
            <div id="songlist-results" class="compact-list"></div>
          </div>
          <div>
            <div class="subhead">
              <h3 id="songlist-detail-title">歌曲</h3>
              <div class="row-actions">
                <button id="songlist-subscribe" type="button">订阅歌单</button>
                <button id="songlist-detail-download-page" type="button">下载本页</button>
                <span id="songlist-detail-page" class="page-label">1 / 1</span>
                <button id="songlist-detail-prev" type="button">上一页</button>
                <button id="songlist-detail-next" type="button">下一页</button>
              </div>
            </div>
            <div id="songlist-detail" class="table-wrap"></div>
          </div>
        </div>
      </section>

      <section id="view-leaderboard" class="panel view-section">
        <div class="panel-head">
          <h2>榜单</h2>
        </div>
        <div class="filterbar stack-tight">
          <select id="leaderboard-source"></select>
          <button id="leaderboard-refresh" type="button">刷新榜单</button>
        </div>
        <div class="browser-grid board-grid">
          <div>
            <div class="subhead">
              <h3>榜单</h3>
              <div class="row-actions">
                <span id="leaderboard-board-page" class="page-label">1 / 1</span>
                <button id="leaderboard-board-prev" type="button">上一页</button>
                <button id="leaderboard-board-next" type="button">下一页</button>
              </div>
            </div>
            <div id="leaderboard-boards" class="compact-list"></div>
          </div>
          <div>
            <div class="subhead">
              <h3 id="leaderboard-title">歌曲</h3>
              <div class="row-actions">
                <button id="leaderboard-subscribe" type="button">订阅榜单</button>
                <button id="leaderboard-download-page" type="button">下载本页</button>
                <span id="leaderboard-song-page" class="page-label">1</span>
                <button id="leaderboard-prev" type="button">上一页</button>
                <button id="leaderboard-next" type="button">下一页</button>
              </div>
            </div>
            <div id="leaderboard-songs" class="table-wrap"></div>
          </div>
        </div>
      </section>

      <section id="view-subscriptions" class="panel view-section">
        <div class="panel-head">
          <h2>订阅</h2>
          <button id="refresh-subscriptions" type="button">刷新</button>
        </div>
        <div class="subscription-toolbar">
          <h3>新订阅默认设置</h3>
          <div class="option-field">
            <label for="subscription-interval">更新间隔</label>
            <select id="subscription-interval">
              <option value="60">1 小时</option>
              <option value="180">3 小时</option>
              <option value="360" selected>6 小时</option>
              <option value="720">12 小时</option>
              <option value="1440">24 小时</option>
            </select>
          </div>
        </div>
        <div id="subscriptions-list" class="list"></div>
      </section>

      <section id="view-sources" class="panel view-section">
        <div class="panel-head">
          <h2>音源</h2>
          <button id="refresh-sources" type="button">刷新</button>
        </div>

        <div class="download-options">
          <h3>下载选项</h3>
          <label><input id="opt-cover" type="checkbox" checked>封面</label>
          <label><input id="opt-lyric" type="checkbox" checked>歌词</label>
          <label><input id="opt-tags" type="checkbox" checked>标签</label>
          <label><input id="opt-verify" type="checkbox" checked>检查</label>
          <span id="netease-cookie-status" class="badge warn">网易云 Cookie 未启用</span>
          <span id="metadata-cache-status" class="badge">缓存 0 B</span>
          <button id="cleanup-metadata-cache" type="button">清理缓存</button>
        </div>

        <div class="source-grid">
          <div>
            <form id="source-url-form" class="stack">
              <label for="source-url">URL 导入</label>
              <div class="inline">
                <input id="source-url" type="url" placeholder="https://example.com/source.js">
                <button type="submit">导入</button>
              </div>
            </form>

            <form id="source-file-form" class="stack">
              <label for="source-file">文件上传</label>
              <div class="inline">
                <input id="source-file" type="file" accept=".js,text/javascript">
                <button type="submit">上传</button>
              </div>
            </form>

            <label class="checkline">
              <input id="allow-unsafe-vm" type="checkbox">
              <span>允许 unsafe VM</span>
            </label>
          </div>

          <div id="sources-list" class="list"></div>
        </div>
      </section>

      <section id="view-tasks" class="panel view-section">
        <div class="panel-head">
          <h2>任务</h2>
          <div class="row-actions">
            <button id="refresh-tasks" type="button">刷新</button>
            <button id="retry-failed-tasks" type="button">重试失败</button>
            <button id="stop-active-tasks" type="button">停止可中断</button>
            <button id="clear-finished-tasks" type="button">清理完成</button>
            <button id="clear-failed-tasks" type="button">清理失败/停止</button>
          </div>
        </div>
        <div class="task-toolbar">
          <label for="task-status-filter">状态</label>
          <select id="task-status-filter">
            <option value="all">全部任务</option>
            <option value="active">活动中</option>
            <option value="waiting">等待</option>
            <option value="resolving">解析</option>
            <option value="downloading">下载</option>
            <option value="metadata_fetching">元数据</option>
            <option value="tagging">写标签</option>
            <option value="verifying">检查</option>
            <option value="finished">完成</option>
            <option value="failed">失败</option>
            <option value="stopped">停止</option>
          </select>
        </div>
        <div id="tasks-summary" class="meta summary-line">总数 0 · 活动 0 · 速度 0 B/s</div>
        <div id="tasks-list" class="list task-list"></div>
      </section>

      <section id="view-files" class="panel view-section">
        <div class="panel-head">
          <h2>文件</h2>
          <button id="refresh-files" type="button">刷新</button>
        </div>
        <div id="files-list" class="table-wrap"></div>
      </section>

      <section id="view-config" class="panel view-section">
        <div class="panel-head">
          <h2>配置</h2>
          <button id="refresh-config" type="button">刷新</button>
        </div>
        <div id="config-summary" class="table-wrap"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
